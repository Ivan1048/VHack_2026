services:
  - type: web
    name: fraudshield-backend
    runtime: python
    region: singapore  # closest to Malaysia
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
